<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>AWAKEN</title>
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
</head>

<body style="margin:0;background:#111827;color:white;display:flex;justify-content:center;align-items:center;height:100vh;font-family:Arial">

  <div style="background:#1f2937;padding:30px;border-radius:12px;text-align:center">
    <h2>AWAKEN LOCK</h2>
    <p>Enter your PIN</p>

    <input id="pin" maxlength="8" style="padding:12px;font-size:20px;text-align:center">
    <br><br>

    <button onclick="unlock()" style="padding:10px 20px">Unlock</button>

    <div id="status" style="margin-top:10px;color:#f87171"></div>
  </div>

<script>
const SITE_CODE = "SITE-A1U84O";
const DEVICE_ID = "cmnxjzu2w0002lu6kuoavlzz4";

const pinInput = document.getElementById("pin");
const status = document.getElementById("status");

let sessionTimer = null;
let idleTimer = null;

// 🔥 CONFIG
const IDLE_LIMIT_MS = 2 * 60 * 1000; // 2 minutes (change later)

// ENTER key
pinInput.addEventListener("keydown", (e) => {
  if (e.key === "Enter") unlock();
});

// 🔥 SOCKET
const socket = io("http://localhost:4000");

socket.emit("join-site", "cmnxjweow0000lu6k3cyobgkf");

socket.on("session:update", (event) => {
  if (event.type === "ENDED") {
    lockScreen();
  }
});

// 🔥 FORMAT TIME
function formatTime(ms) {
  const totalSeconds = Math.floor(ms / 1000);
  const h = String(Math.floor(totalSeconds / 3600)).padStart(2, "0");
  const m = String(Math.floor((totalSeconds % 3600) / 60)).padStart(2, "0");
  const s = String(totalSeconds % 60).padStart(2, "0");
  return `${h}:${m}:${s}`;
}

// 🔥 UNLOCK UI
function unlockScreen(expiresAt) {
  document.body.innerHTML = `
    <div style="display:flex;flex-direction:column;justify-content:center;align-items:center;height:100vh;background:#111827;color:white;">
      <h1>Session Active</h1>
      <h2 id="timer" style="margin-top:20px;color:#93c5fd;"></h2>
      <p style="margin-top:10px;color:#fca5a5;">Idle timeout enabled</p>
    </div>
  `;

  startSessionTimer(expiresAt);
  startIdleTracking();
}

// 🔥 SESSION TIMER
function startSessionTimer(expiresAt) {
  const timerEl = document.getElementById("timer");

  function update() {
    const remaining = new Date(expiresAt) - new Date();

    if (remaining <= 0) {
      lockScreen();
      return;
    }

    timerEl.innerText = "Time left: " + formatTime(remaining);
  }

  update();
  sessionTimer = setInterval(update, 1000);
}

// 🔥 IDLE TRACKING
function startIdleTracking() {
  function resetIdleTimer() {
    if (idleTimer) clearTimeout(idleTimer);

    idleTimer = setTimeout(() => {
      console.log("User idle → locking");
      lockScreen();
    }, IDLE_LIMIT_MS);
  }

  // track activity
  window.addEventListener("mousemove", resetIdleTimer);
  window.addEventListener("keydown", resetIdleTimer);
  window.addEventListener("click", resetIdleTimer);

  resetIdleTimer();
}

// 🔥 LOCK
function lockScreen() {
  if (sessionTimer) clearInterval(sessionTimer);
  if (idleTimer) clearTimeout(idleTimer);

  location.reload();
}

// 🔥 MAIN FLOW
async function unlock() {
  const pin = pinInput.value;
  status.innerText = "Checking...";

  try {
    const verifyRes = await fetch("http://localhost:4000/api/pins/verify", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        siteCode: SITE_CODE,
        pin,
        deviceId: DEVICE_ID
      })
    });

    const verifyData = await verifyRes.json();

    if (!verifyData.ok) throw new Error("Invalid PIN");

    const sessionRes = await fetch("http://localhost:4000/api/sessions/start", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        siteCode: SITE_CODE,
        pin,
        deviceId: DEVICE_ID
      })
    });

    const sessionData = await sessionRes.json();

    if (!sessionData.ok) throw new Error("Session failed");

    unlockScreen(verifyData.expiresAt);

  } catch (err) {
    console.error(err);
    status.innerText = "Invalid PIN or error";
    pinInput.value = "";
  }
}
</script>

</body>
</html>
