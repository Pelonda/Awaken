<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>AWAKEN</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #111827;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: #1f2937;
      padding: 30px;
      border-radius: 12px;
      text-align: center;
    }

    input {
      padding: 12px;
      font-size: 20px;
      width: 200px;
      text-align: center;
      margin-top: 10px;
    }

    button {
      margin-top: 15px;
      padding: 10px 20px;
      font-size: 16px;
    }

    .error {
      color: #f87171;
      margin-top: 10px;
    }
  </style>
</head>

<body>
  <div class="card">
    <h2>AWAKEN LOCK</h2>
    <p>Enter your PIN</p>

    <input id="pin" maxlength="8" />
    <br />
    <button onclick="unlock()">Unlock</button>

    <div id="error" class="error"></div>
  </div>

  <script>
    async function unlock() {
      const pin = document.getElementById("pin").value;
      const error = document.getElementById("error");

      error.innerText = "";

      try {
        const res = await fetch("http://localhost:4000/api/pins/verify", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            siteCode: "SITE-A1U84O",
            pin,
            deviceId: "YOUR_DEVICE_ID"
          })
        });

        const data = await res.json();

        if (!data.ok) {
          throw new Error("Invalid PIN");
        }

        // start session
        await fetch("http://localhost:4000/api/sessions/start", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            siteCode: "SITE-A1U84O",
            pin,
            deviceId: "YOUR_DEVICE_ID"
          })
        });

        document.body.innerHTML = "<h1>Unlocked</h1>";

      } catch (err) {
        error.innerText = "Invalid PIN";
      }
    }
  </script>
</body>
</html>
