<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>AWAKEN</title>

  <!-- FINAL WORKING CSP -->
  <meta http-equiv="Content-Security-Policy"
    content="
      default-src * 'unsafe-inline' 'unsafe-eval' data:;
      connect-src * http://localhost:4000 ws://localhost:4000;
      script-src * 'unsafe-inline' 'unsafe-eval';
      style-src * 'unsafe-inline';
    ">
</head>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #111827;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: #1f2937;
      padding: 30px;
      border-radius: 12px;
      text-align: center;
      width: 300px;
    }

    input {
      padding: 12px;
      font-size: 20px;
      width: 200px;
      text-align: center;
      margin-top: 10px;
    }

    button {
      margin-top: 15px;
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
    }

    .error {
      color: #f87171;
      margin-top: 10px;
    }

    .loading {
      color: #93c5fd;
      margin-top: 10px;
    }
  </style>

<body>
  <div class="card">
    <h2>AWAKEN LOCK</h2>
    <p>Enter your PIN</p>

    <input id="pin" maxlength="8" autofocus />
    <br />
    <button onclick="unlock()">Unlock</button>

    <div id="status"></div>
  </div>

<script>
const SITE_CODE = "SITE-A1U84O";
const DEVICE_ID = "cmnxjzu2w0002lu6kuoavlzz4";

const pinInput = document.getElementById("pin");
const status = document.getElementById("status");

// 🔥 ENTER KEY SUPPORT
pinInput.addEventListener("keydown", function (e) {
  if (e.key === "Enter") {
    unlock();
  }
});

async function unlock() {
  const pin = pinInput.value;

  status.innerHTML = "<div class='loading'>Checking...</div>";

  try {
    // STEP 1: VERIFY PIN
    const verifyRes = await fetch("http://localhost:4000/api/pins/verify", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        siteCode: SITE_CODE,
        pin,
        deviceId: DEVICE_ID
      })
    });

    const verifyData = await verifyRes.json();

    if (!verifyData.ok) {
      throw new Error("Invalid PIN");
    }

    // STEP 2: START SESSION
    const sessionRes = await fetch("http://localhost:4000/api/sessions/start", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        siteCode: SITE_CODE,
        pin,
        deviceId: DEVICE_ID
      })
    });

    const sessionData = await sessionRes.json();

    if (!sessionData.ok) {
      throw new Error("Session failed");
    }

    // SUCCESS UI
    document.body.innerHTML = `
      <div style="display:flex;justify-content:center;align-items:center;height:100vh;background:#111827;color:white;">
        <h1>Unlocked</h1>
      </div>
    `;

  } catch (err) {
    console.error(err);
    status.innerHTML = "<div class='error'>Invalid PIN or session error</div>";
    pinInput.value = "";
  }
}
</script>

</body>
</html>
